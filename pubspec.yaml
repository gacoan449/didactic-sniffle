name: petani_desa_berkah
description: E-Commerce Pertanian Terpadu Petani Desa Berkah
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase Inti
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.1
  cloud_firestore: ^4.13.6
  firebase_storage: ^11.6.0
  firebase_messaging: ^14.7.10
  firebase_app_check: ^0.2.1+8
  cloud_functions: ^4.6.5

  # Keamanan & Utilitas
  crypto: ^3.0.3
  convert: ^3.1.1
  encrypt: ^5.0.3
  local_auth: ^2.1.7
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1
  intl: ^0.18.1

  # Fitur Lainnya
  geolocator: ^10.1.0
  google_maps_flutter: ^2.5.3
  http: ^1.1.0
  image_picker: ^1.0.7
  mobile_scanner: ^3.5.5
  printing: ^5.11.1
  pdf: ^3.10.7
  excel: ^2.1.0
  syncfusion_flutter_charts: ^24.1.45

dev_dependencies:

  # Serialization & Freezed (WAJIB)
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

dev_dependencies:
  build_runner: ^2.4.6
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.3
  build_runner: ^2.4.6
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  mockito: ^5.4.4
  firebase_auth_mocks: ^0.13.0
  fake_cloud_firestore: ^2.4.9
  integration_test:
    sdk: flutter
  lcov: ^1.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
