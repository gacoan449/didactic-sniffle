name: petanidesaberkah
description: Marketplace Hasil Tani & Perkebunan Enterprise
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # =========================
  # FIREBASE
  # =========================
  firebase_core: ^2.30.0
  firebase_auth: ^4.19.0
  cloud_firestore: ^4.17.0
  firebase_storage: ^11.7.0
  firebase_messaging: ^14.8.0
  firebase_app_check: ^0.2.2
  firebase_analytics: ^10.10.0
  firebase_crashlytics: ^3.5.0

  # =========================
  # STATE MANAGEMENT
  # =========================
  provider: ^6.1.2

  # =========================
  # NETWORK
  # =========================
  dio: ^5.4.3
  connectivity_plus: ^5.0.2

  # =========================
  # IMAGE
  # =========================
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  # =========================
  # LOCATION
  # =========================
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  google_maps_flutter: ^2.6.1

  # =========================
  # QR & BARCODE
  # =========================
  mobile_scanner: ^5.1.1
  qr_flutter: ^4.1.0

  # =========================
  # SHARE
  # =========================
  share_plus: ^9.0.0

  # =========================
  # FORMAT
  # =========================
  intl: ^0.19.0

  # =========================
  # SVG
  # =========================
  flutter_svg: ^2.0.10

  # =========================
  # OTP
  # =========================
  pin_code_fields: ^8.0.1

  # =========================
  # SECURITY
  # =========================
  local_auth: ^2.2.0
  crypto: ^3.0.3

  # =========================
  # PDF & EXCEL
  # =========================
  pdf: ^3.10.8
  printing: ^5.12.0
  excel: ^4.0.3

  # =========================
  # STORAGE
  # =========================
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3

  # =========================
  # NOTIFICATION
  # =========================
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.2

  # =========================
  # REFRESH
  # =========================
  pull_to_refresh: ^2.0.0

  # =========================
  # UUID
  # =========================
  uuid: ^4.4.0

  # =========================
  # PERMISSION
  # =========================
  permission_handler: ^11.3.1

  # =========================
  # ICON
  # =========================
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/banner/
    - assets/category/
    - assets/logo/
    - assets/lottie/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
        - asset: assets/fonts/Poppins-SemiBold.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
