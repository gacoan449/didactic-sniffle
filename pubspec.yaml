name: petani_desa_berkah
description: Aplikasi E-Commerce Hasil Tani Petani Desa Berkah
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

# ✅ SEMUA DEPENDENSI DITARUH DI SINI, BUKAN DI BAWAH flutter:
dependencies:
  flutter:
    sdk: flutter

  # Firebase Inti
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.1
  cloud_firestore: ^4.13.6
  firebase_storage: ^11.6.0

  # Kriptografi & Keamanan
  crypto: ^3.0.3
  convert: ^3.1.1
  encrypt: ^5.0.3
  pointycastle: ^3.7.3

  # Utilitas
  intl: ^0.18.1
  image_picker: ^1.0.7
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  connectivity_plus: ^5.0.2
  device_info_plus: ^9.1.2
  http: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.3
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
